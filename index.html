<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus AR Navigation | Assignment 2</title>
    <style>
        html,
        body {
            overflow: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: #000;
            color: #fff;
        }

        #renderCanvas {
            width: 100%;
            height: 100%;
            touch-action: none;
            display: block;
        }

        #ui {
            position: fixed;
            left: 50%;
            bottom: 1.5rem;
            transform: translateX(-50%);
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            z-index: 10;
        }

        #ui button {
            border: none;
            border-radius: 999px;
            padding: 0.35rem 0.9rem;
            font-size: 0.8rem;
            cursor: pointer;
            background: #1e90ff;
            color: #fff;
            transition: background 0.15s ease, transform 0.1s ease;
        }

        #ui button:hover {
            background: #3aa0ff;
            transform: translateY(-1px);
        }

        #ui button.active {
            background: #32cd32;
        }
    </style>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="https://code.jquery.com/pep/0.4.3/pep.js"></script>
    <script src="js/ar-campus.js" defer></script>
</head>
<body>
    <canvas id="renderCanvas" touch-action="none"></canvas>

    <div id="ui" aria-label="AR navigation controls">
        <button type="button" data-destination="elevator">Elevator</button>
        <button type="button" data-destination="classroom">Classroom</button>
        <button type="button" data-destination="exit">Exit</button>
        <button type="button" id="audio-toggle" aria-pressed="false">Audio: Off</button>
    </div>
</body>
</html>
